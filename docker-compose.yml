services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/starterpack
      DATABASE_USER: starterpack
      DATABASE_PASSWORD: starterpack
      JWT_SECRET: bXktc3VwZXItc2VjcmV0LWtleS1mb3ItbG9jYWwtZGV2ZWxvcG1lbnQtb25seS1jaGFuZ2UtaW4tcHJvZHVjdGlvbg==
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: starterpack
      POSTGRES_USER: starterpack
      POSTGRES_PASSWORD: starterpack
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starterpack"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
